<html>

 <head>
    <title> Inline and Block Elements </title>
 </head>
 
 
 <body>

    <!-- Every HTML element is either inline or block that we will show the difference -->
    
    <!-- Block-level elements -->
	 <!-- Block-level elements take up the full width available -->
     <h3 style = " border:solid ; color:purple ; font-size:16 " > Heading </h3>
     <p style = " border:solid ; color:purple ; font-size:16 " > ParaGraph </p> 
     <ul style = "border:solid">
	 <li> List item A </li>
	 <li> List item B </li>
	 </ul>
  
   <!-- inline elements -->  
    <!-- Inline elements only take up as much width as necessary -->
     <h2> Inline Elements </h2>
     
	 <p>
	  <b style = "border: solid" >
	    BOLD
	  </b>
	  text
	 </p>
    
	 <button style = "border:solid" >
     Click me
	 </button>
    
	<label style = "border: solid" for = "fullName" >
	  Full Name
	</label>
    
	<input type = "text" id = "fullName" >
	
	<!-- We use br empty to divide block elements -->
	<br>
	<br>
	 <button> Button A </button>
	 <button> Button B </button> <br>
	 <button> Button C </button> <br>
	 <button> Button D </button>
    
	<p> part 1 <br>
	 part 2 <br>
	part 3 </p>
    
  <!-- Lets check if h3 is block or inline -->
   <h3> First Heading 3 </h3>
   <h3> Second Heading 3 </h3>
 
 
 
 
 
 
 
 </body>
</html>
