<html>

 <head>
  <title> Style Attribute </title>
 </head>
 
 <body>
 
 <h1 style = "border: 1px solid purple ; color : purple ; font-size : large ; font-family : soft ; text-align : center "  > First-level heading </h1>
 
 <button style = " color:white ; background-color:red" > Like </button>
 
 <!-- Button with white text and red background -->
 <button style = "color:white ; background-color:red ; border: solid" > Example Button </button>

 <!-- unOrdered list of two items with a border -->
 <!-- Block-level elements take up the full width available such as lists -->
  <ul style = "color: pink ; background-color: purple ; border: 1px solid blue" >
    
	<li style = "color: pink ; background-color: purple ; border: 1px solid blue"> Services </li>
    <li style = "color: pink ; background-color: purple ; border: 1px solid blue"> Products </li>
  </ul>
  
  <!-- buttons are inline elements -->
  <!-- Inline elements only take up as much width as necessary -->
   <button> Like </button> 
   <br>
   <br>
   <button> Comment </button>
   
  <!-- paragraphs are block-level elements taking up the full width available -->
   <p> <strong> First ParaGraph <strong> </p>
   <p> <em>   Second ParaGraph  </em>  </p>
 
 <!-- Inline elements are nested inside block-level elements -->
   <!-- in other words, block-level elements contain inline elements -->
  <p> <!-- ParaGraph is a block-level container element -->
    
	Hi this is <a href = "https://linkedin.com/in/sasanace" > Sasan Ace </a> <!-- anchor container is an inline element -->
    
  </p>  
 
 
  <!-- in forms we use breaks as many elements are inline such as input -->
  <p>
    
	part 1
	<br>
	part 2
	<br>
	part 3
	
  </p>
  
  <!-- Let us check who is block and who is inline -->
  <label> Name </label>
  <label> Gender </label> 
  <input type = "text" >
  <h3> First heading 3 </h3>
  <h3> Second heading 3 </h3>
 
  <ol>
    <li> ParaKnows </li>
	<li> ParaXversity </li>
  </ol>
 
  <ul>
    <li> Trailblazer </li>
	<li> Jaam OS </li>
  </ul>
 
 <h1> First Heading 1 </h1>
 <h1> Second Heading 1 </h1> 
 
 
 
 
 
 
 
 </body>


</html>
